<!DOCTYPE html>
<html lang="en" ng-app="bt.app">
<head>
    <!-- Meta, title, CSS, favicons, etc. -->
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Toptal Battleship code game tester">
    <meta name="keywords" content="AngularJS, Battleship, Tester">
    <meta name="author" content="Quan Le">

    <title>Test your Toptal Battleship code game</title>

    <!-- Bootstrap core CSS -->
    <link href="/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/codemirror/5.0.0/codemirror.min.css">
    <script src="//cdnjs.cloudflare.com/ajax/libs/codemirror/5.0.0/codemirror.min.js"></script>

</head>
<body class="bs-docs-home">
    <!-- Docs master nav -->
    <header class="navbar navbar-static-top navbar-default" id="top" role="banner">
        <div class="container">
            <div class="navbar-header">
                <button class="navbar-toggle collapsed" type="button" data-toggle="collapse" data-target=".bs-navbar-collapse">
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a href="/" class="navbar-brand">Battleship Tester</a>
            </div>
            <nav class="collapse navbar-collapse bs-navbar-collapse">
                <ul class="nav navbar-nav">
                    <li>
                        <!--<a href="../getting-started/">Getting started</a>-->
                    </li>
                </ul>
                <ul class="nav navbar-nav navbar-right">
                    <!--<li><a href="http://blog.getbootstrap.com" onclick="ga('send', 'event', 'Navbar', 'Community links', 'Blog');">Blog</a></li>-->
                </ul>
            </nav>
        </div>
    </header>


    <!-- Page content of course! -->
    <main id="content" role="main">
        <div class="container" ng-controller="bt.main.Ctrl">

            <h1 class="page-header">
                Toptal Battleship code game tester
            </h1>

            <!--<p>-->
                <!--<a href="https://github.com/quanla/angular-bit">Code repo here</a>-->
            <!--</p>-->

            <!--<p>-->
                <!--Sometimes angular applications is required to use data in bit format: checkboxes that show and change a bit of a number, or select box (multiple) that have options corresponded to bit positions in a number.-->
            <!--</p>-->
            
            <h2>
                Your Bot code:
                <div class="pull-right small">
                    <ul class="nav nav-pills">
                        <li role="presentation" ng-class="codeDirect ? 'active' : ''"><a href="" ng-click="codeDirect = true">Direct Source</a></li>
                        <li role="presentation" ng-class="!codeDirect ? 'active' : ''"><a href="" ng-click="codeDirect = false">Load from somewhere</a></li>
                    </ul>
                </div>
            </h2>

            <div class="panel panel-default">
                <div class="panel-body">
                    <div class="row">
                        <div class="col-lg-12 col-xs-12">
                            <div code-mirror="code" ng-if="codeDirect"></div>
                            <code-location ng-if="!codeDirect">
                            </code-location>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-lg-12 col-xs-12">
                            <div class="pull-right buttons">
                                <button class="btn btn-primary" ng-click="runTest()">Run Test</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div ng-if="game">

                <h1 style="margin-top: 80px">
                    Game Board:
                </h1>

                <div class="panel panel-default">
                    <div class="panel-body">
                        <div class="row">
                            <div class="col-lg-3 col-xs-12">
                                <div class="row">
                                    <div class="col-xs-12">
                                        <button class="btn btn-success" ng-click="runTest()">Restart Game</button>
                                    </div>
                                    <div class="col-xs-12">
                                        <div class="checkbox">
                                            <label>
                                                <input type="checkbox" ng-model="gameOptions.allowLogging"> Allow logging
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-xs-12">
                                        <button class="btn btn-primary" ng-click="game.prevTurn()">Prev Turn</button>
                                        Turn: <span ng-bind="game.turn"></span>
                                        <button class="btn btn-primary" ng-click="game.nextTurn()">Next Turn</button>
                                        <button class="btn btn-warning" ng-click="autoRun(100)" ng-bind="autoRunTask == null ? 'Auto Run' : 'Running...'"></button>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-xs-12">
                                        <button class="btn btn-default" ng-click="log()">Log your Bot</button>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-9 col-xs-12">
                                <game-board class="pull-right"></game-board>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Bootstrap core JavaScript
    ================================================== -->
    <!-- Placed at the end of the document so the pages load faster -->
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
    <script src="/js/bootstrap.min.js"></script>
    <script src="//ajax.googleapis.com/ajax/libs/angularjs/1.3.13/angular.js"></script>

    <script src="/js/common-utils.js"></script>

    <!-- spa-js start -->
    <script src="/battleship-tester/angular/battleship-tester-app.js"></script>
    <script src="/battleship-tester/angular/game/game.js"></script>
    <script src="/battleship-tester/angular/main/main.js"></script>
    <script src="/battleship-tester/angular/services/services.js"></script>
    <!-- spa-js end -->

</body>
</html>
