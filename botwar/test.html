<!DOCTYPE html>
<html lang="en" ng-app="bw.test.app">
<head>
    <title>BotwarJS Testing</title>

    <!-- Bootstrap core CSS -->
    <link href="/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>
<body class="bs-docs-home">

    <!-- Docs master nav -->
    <header class="navbar navbar-static-top navbar-default" id="top" role="banner">
        <div class="container">
            <div class="navbar-header">
                <button class="navbar-toggle collapsed" type="button" data-toggle="collapse" data-target=".bs-navbar-collapse">
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a href="/botwar/" class="navbar-brand">Botwar JS Testing</a>
            </div>
            <nav class="collapse navbar-collapse bs-navbar-collapse">
                <ul class="nav navbar-nav">
                    <li>
                        <!--<a href="../getting-started/">Getting started</a>-->
                    </li>
                </ul>
                <ul class="nav navbar-nav navbar-right">
                    <!--<li><a href="http://blog.getbootstrap.com" onclick="ga('send', 'event', 'Navbar', 'Community links', 'Blog');">Blog</a></li>-->
                </ul>
            </nav>
        </div>
    </header>

    <!-- Page content of course! -->
    <main id="content" role="main">
        <div class="container" ng-controller="bw.test.Ctrl">
            <div class="row">
                <div class="col-lg-3">
                    <button class="btn btn-primary btn-lg" ng-click="testRotate()">Test Rotate</button>
                    <br/>
                    <button class="btn btn-primary btn-lg" ng-click="testWalk()">Test Walk</button>
                    <button class="btn btn-primary btn-lg" ng-click="changeDir()">Change dir</button>
                </div>
                <div class="col-lg-9 text-center">
                    <div width="800" height="800" battlefield="game"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap core JavaScript
    ================================================== -->
    <!-- Placed at the end of the document so the pages load faster -->
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
    <script src="/js/bootstrap.min.js"></script>
    <script src="//ajax.googleapis.com/ajax/libs/angularjs/1.3.13/angular.js"></script>

    <script src="/js/common-utils.js"></script>

    <script src="js/pixi.min.js"></script>

    <!-- spa-js start -->
    <script src="/botwar/angular/battlefield/battlefield.js"></script>
    <script src="/botwar/angular/battlefield/renderer/renderer.js"></script>
    <script src="/botwar/angular/botwar-app.js"></script>
    <script src="/botwar/angular/main/main.js"></script>
    <script src="/botwar/angular/test/test.js"></script>
    <!-- spa-js end -->

</body>
</html>
